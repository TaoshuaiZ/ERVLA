<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ERVLA: Welcome</title>
  <link rel="icon" type="image/webp" href="./static/images/Logo.webp?v=2">
  <link rel="preload" as="image" href="static/images/Welcome.webp" fetchpriority="high">
  <!-- Local Libraries and Stylesheets -->
  <link href="static/css/OverlayScrollbars.min.css" rel="stylesheet">
  <link href="static/css/all.min.css" rel="stylesheet">
  <!-- Custom Stylesheet -->
  <link rel="stylesheet" href="static/css/styles.css">
  <!-- Local Scripts -->
  <script src="static/js/jquery.min.js" defer></script>
  <script src="static/js/gsap.min.js" defer></script>
  <script src="static/js/ScrollTrigger.min.js" defer></script>
  <script src="static/js/scripts.js" defer></script>
  <style>
    #paper, #download, #team, #explore, #stats {
      display: none;
    }
    html, body {
      overflow: hidden;
    }
    body,
    .header,
    .logo,
    .please-scroll,
    .please-scroll-2,
    #reminder {
      color: #ffffff !important;
    }
    .welcome-gradient-text {
      background: none !important;
      -webkit-background-clip: initial !important;
      background-clip: initial !important;
      color: #ffffff !important;
      text-shadow: 0 2px 10px rgba(255, 255, 255, 0.18);
    }
    .welcome-logo {
      font-family: Calibri, 'Segoe UI', Arial, sans-serif;
      font-size: 15vw;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    .welcome-subtitle {
      font-family: Calibri, 'Segoe UI', Arial, sans-serif;
      font-size: 1.5vw;
      font-weight: 700;
      opacity: 1;
      color: #ffffff !important;
      background: none !important;
      -webkit-background-clip: initial !important;
      background-clip: initial !important;
    }
    .welcome-cta {
      font-family: Calibri, 'Segoe UI', Arial, sans-serif;
      font-size: 2.8em;
      font-weight: 800;
      opacity: 1;
      letter-spacing: 0.01em;
      color: #ffffff !important;
      background: none !important;
      -webkit-background-clip: initial !important;
      background-clip: initial !important;
    }
    #reminder.welcome-subtitle,
    #reminder.welcome-cta {
      color: #ffffff !important;
    }
    .welcome-glow {
      position: relative;
      display: inline-block;
      isolation: isolate;
      z-index: 0;
    }
    .welcome-glow::before {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      background: none;
      -webkit-background-clip: initial;
      background-clip: initial;
      color: rgba(255, 255, 255, 0.9);
      filter: blur(6px);
      opacity: 0.28;
      z-index: 0;
      pointer-events: none;
    }
    .welcome-glow > span,
    .welcome-glow > strong,
    .welcome-glow {
      position: relative;
      z-index: 1;
    }
    .welcome-logo.welcome-glow::before {
      filter: blur(8px);
      opacity: 0.38;
    }
    .welcome-cta.welcome-glow::before {
      filter: blur(7px);
      opacity: 0.42;
    }
    .welcome-subtitle.welcome-glow::before,
    .welcome-cta.welcome-glow::before {
      background: none;
      color: rgba(255, 255, 255, 0.82);
      -webkit-background-clip: initial;
      background-clip: initial;
      opacity: 0.18;
    }
    /* 替换背景图 */
    #loading-screen,
    #content {
      background-image:
        linear-gradient(135deg, rgba(63, 42, 16, 0.62), rgba(181, 126, 35, 0.34)),
        url('static/images/Welcome.webp') !important;
      background-repeat: no-repeat !important;
      background-size: cover !important;
      background-position: center center !important;
      background-color: #4b3518 !important;
      background-blend-mode: multiply, normal !important;
    }
    /* 预加载主页面的关键资源 */
    .preload {
      position: absolute;
      width: 0;
      height: 0;
      overflow: hidden;
    }
    .preload img {
      width: 0;
      height: 0;
    }
  </style>
</head>
<body>
  <!-- 预加载主页面的关键资源 -->
  <div class="preload">
    <img src="static/images/Logo.webp?v=2" alt="preload logo">
    <img src="static/images/Overview.png" alt="preload teaser">
  </div>

  <script>
    // 预加载主页面
    const preloadHomePage = () => {
      const link = document.createElement('link');
      link.rel = 'preload';
      link.as = 'document';
      link.href = 'home_page.html';
      document.head.appendChild(link);
    };
    
    // 页面加载完成后预加载主页面
    window.addEventListener('load', preloadHomePage);

    // 点击事件处理
    document.addEventListener('click', function() {
        window.location.href = 'home_page.html'; 
    });
  </script>

  <div id="loading-screen"></div>
  <div id="content">
    <!-- Navbar Section -->
    <header class="header">
      <div class="header-top" style="top: 30%;">
        <div class="logo welcome-logo welcome-gradient-text welcome-glow" data-text="ERVLA">ERVLA</div>
        <div class="please-scroll-2" style="top: 220%; opacity: 1;">
          <span id="reminder" class="welcome-subtitle welcome-glow" data-text="Revisiting Embodied Chain-of-Thought for Generalizable Robotic Manipulation">Revisiting Embodied Chain-of-Thought for Generalizable Robotic Manipulation</span>
        </div>
      </div>
      <div class="please-scroll" style="opacity: 1;">
        <span id="reminder" class="welcome-cta welcome-glow" data-text="Please click to continue!">Please click to continue!</span>
      </div>
    </header>
    <nav id="navigation-left"></nav>
  </div>
</body>
</html>
